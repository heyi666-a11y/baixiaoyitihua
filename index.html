<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百校一体化系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: relative;
        }

        /* 背景装饰动画 */
        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-decoration::before,
        .bg-decoration::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        .bg-decoration::before {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-decoration::after {
            width: 300px;
            height: 300px;
            bottom: -50px;
            right: -50px;
            animation-delay: -10s;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            animation: float 15s infinite ease-in-out;
        }

        .circle:nth-child(1) {
            width: 200px;
            height: 200px;
            top: 20%;
            right: 10%;
            animation-delay: -5s;
        }

        .circle:nth-child(2) {
            width: 150px;
            height: 150px;
            bottom: 30%;
            left: 15%;
            animation-delay: -8s;
        }

        .circle:nth-child(3) {
            width: 100px;
            height: 100px;
            top: 60%;
            left: 30%;
            animation-delay: -12s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
            width: 90%;
        }

        /* Logo区域 */
        .logo-wrapper {
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        /* 标题 */
        .title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 1s ease-out 0.3s both;
            letter-spacing: 2px;
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 50px;
            animation: fadeInUp 1s ease-out 0.5s both;
            font-weight: 300;
        }

        /* 进入按钮 */
        .enter-btn {
            display: inline-block;
            padding: 16px 60px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #667eea;
            background: #ffffff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease-out 0.7s both, pulse 2s infinite 1.5s;
            position: relative;
            overflow: hidden;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            color: #764ba2;
        }

        .enter-btn:hover::before {
            left: 100%;
        }

        .enter-btn:active {
            transform: translateY(-1px);
        }

        /* 点击进入动画 - 优雅淡出 */
        .container.exiting {
            animation: elegantExit 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes elegantExit {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
                filter: blur(10px);
            }
        }

        /* 页面过渡动画 - 白色跳动波纹圆圈 */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .page-transition.active {
            pointer-events: all;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .ripple-container {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            background: transparent;
            opacity: 0;
        }

        .ripple:nth-child(1) {
            animation: rippleEffect 1.5s ease-out infinite;
        }

        .ripple:nth-child(2) {
            animation: rippleEffect 1.5s ease-out infinite 0.3s;
        }

        .ripple:nth-child(3) {
            animation: rippleEffect 1.5s ease-out infinite 0.6s;
        }

        @keyframes rippleEffect {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
                border-width: 4px;
            }
            50% {
                opacity: 0.6;
                border-width: 2px;
            }
            100% {
                width: 300vmax;
                height: 300vmax;
                opacity: 0;
                border-width: 0;
            }
        }

        /* 动画定义 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }
            50% {
                box-shadow: 0 10px 40px rgba(255, 255, 255, 0.3);
            }
        }

        /* 页脚 */
        .footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            z-index: 1;
            animation: fadeIn 1s ease-out 1s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .title {
                font-size: 1.8rem;
                letter-spacing: 1px;
            }

            .subtitle {
                font-size: 0.95rem;
                margin-bottom: 40px;
            }

            .logo {
                width: 100px;
                height: 100px;
            }

            .enter-btn {
                padding: 14px 50px;
                font-size: 1.1rem;
            }

            .container {
                padding: 30px 15px;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            .logo {
                width: 80px;
                height: 80px;
                border-width: 3px;
            }

            .enter-btn {
                padding: 12px 40px;
                font-size: 1rem;
            }

            .footer {
                font-size: 0.75rem;
            }
        }

        @media (min-width: 1200px) {
            .title {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1.3rem;
            }

            .logo {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- 页面过渡层 -->
    <div class="page-transition" id="pageTransition">
        <div class="ripple-container">
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
        </div>
    </div>

    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- 主内容 -->
    <div class="container">
        <div class="logo-wrapper">
            <img src="./images/school-logo.jpg" alt="学校Logo" class="logo">
        </div>
        <h1 class="title">百校一体化系统</h1>
        <p class="subtitle">智慧校园 · 互联互通 · 共创未来</p>
        <a href="pages/index/index.html" class="enter-btn" id="enterBtn">进入系统</a>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        © 2024 百校一体化系统 版权所有
    </div>

    <script>
        document.getElementById('enterBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const container = document.querySelector('.container');
            const transition = document.getElementById('pageTransition');
            const href = this.getAttribute('href');
            
            // 添加退出动画类
            container.classList.add('exiting');
            
            // 延迟显示页面过渡动画
            setTimeout(() => {
                transition.classList.add('active');
            }, 400);
            
            // 延迟跳转页面
            setTimeout(() => {
                window.location.href = href;
            }, 1000);
        });
    </script>
</body>
</html>
